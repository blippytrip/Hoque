<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOQUE — Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .wordmark {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .sidebar-logo .role-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .sidebar-nav { flex: 1; padding: 16px 12px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      width: 100%;
      transition: background 0.15s, color 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .logout-btn:hover { background: rgba(243,106,74,0.1); color: var(--danger); }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar {
      padding: 28px 36px 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .page-title {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
    }
    .page-title em { font-style: italic; color: var(--accent); }

    .print-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .print-btn:hover { color: var(--text); border-color: var(--text); }

    .page-content { padding: 28px 36px 48px; }

    /* ── DATE FILTER ── */
    .filter-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 28px;
    }
    .filter-row label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .filter-row input[type="date"] { width: 180px; margin: 0; }

    /* ── STAT GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
    }
    .stat-num {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 6px;
    }
    .stat-card.accent .stat-num { color: var(--accent); }
    .stat-card.warn   .stat-num { color: var(--warn); }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 0; }

    /* ── BAR CHART ── */
    .bar-chart { display: flex; flex-direction: column; gap: 14px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label {
      width: 110px;
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: right;
    }
    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--elevated);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      width: 0%;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bar-fill.warn { background: var(--warn); }
    .bar-val {
      width: 50px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
    }

    /* ── TRANSACTION TABLE ── */
    .amount-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .amount-table th {
      text-align: left;
      padding: 9px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .amount-table td { padding: 12px 14px; border-bottom: 1px solid rgba(35,44,58,0.5); }
    .amount-table tr:last-child td { border-bottom: none; }
    .amount-table tfoot td { padding: 12px 14px; }
    .amount-table tbody tr { transition: background 0.1s; }
    .amount-table tbody tr:hover { background: var(--elevated); }

    .date-range-note {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    #results { display: none; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s ease;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(74,243,196,0.3); }
    #toast.error   { background: rgba(243,106,74,0.15); color: var(--danger); border: 1px solid rgba(243,106,74,0.3); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

    @media print {
      .sidebar, .filter-row, .print-btn { display: none !important; }
      body { display: block; }
      .main { overflow: visible; }
      #results { display: block !important; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">HOQUE</div>
      <span class="role-badge">Reports</span>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Summary
      </button>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Sign out
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1 class="page-title">Summary <em>Reports</em></h1>
      <button class="print-btn" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Print
      </button>
    </div>

    <div class="page-content">

      <!-- Date filter -->
      <div class="filter-row">
        <div>
          <label>From</label>
          <input type="date" id="startDate">
        </div>
        <div>
          <label>To</label>
          <input type="date" id="endDate">
        </div>
        <button class="btn btn-primary" onclick="loadSummary()">Generate Report</button>
      </div>

      <!-- Results (hidden until loaded) -->
      <div id="results">

        <div class="date-range-note" id="dateRangeNote"></div>

        <!-- 4 stat cards derived from patientsByStatus -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Two charts side by side -->
        <div class="two-col">
          <div class="card">
            <div class="card-title">Patients by Status</div>
            <div class="bar-chart" id="patientStatusChart"></div>
          </div>
          <div class="card">
            <div class="card-title">Revenue by Transaction Status</div>
            <div class="bar-chart" id="txAmountChart"></div>
          </div>
        </div>

        <!-- Transaction breakdown table -->
        <div class="card" style="margin-top:20px">
          <div class="card-title">Transaction Breakdown</div>
          <div id="txTableWrap"></div>
        </div>

      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    // Default dates: last 30 days
    (function () {
      const today = new Date();
      const prior = new Date();
      prior.setDate(today.getDate() - 30);
      document.getElementById('endDate').value   = today.toISOString().split('T')[0];
      document.getElementById('startDate').value = prior.toISOString().split('T')[0];
    })();

    function toast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      setTimeout(() => t.className = '', 2800);
    }

    // Render animated horizontal bar chart
    function renderBarChart(containerId, entries, colorClass = '') {
      const el = document.getElementById(containerId);
      if (!entries.length) {
        el.innerHTML = '<div class="empty-state">No data for this period</div>';
        return;
      }
      const maxVal = Math.max(...entries.map(([, v]) => v), 1);
      el.innerHTML = entries.map(([label, val]) => `
        <div class="bar-row">
          <div class="bar-label">${label}</div>
          <div class="bar-track">
            <div class="bar-fill ${colorClass}" data-pct="${(val / maxVal * 100).toFixed(1)}"></div>
          </div>
          <div class="bar-val">${typeof val === 'number' && val > 999
            ? '₹' + val.toLocaleString('en-IN')
            : val}</div>
        </div>`).join('');

      // Trigger CSS transition after render
      requestAnimationFrame(() => {
        el.querySelectorAll('.bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      });
    }

    async function loadSummary() {
      const token = getToken();
      if (!token) return logout();

      const start = document.getElementById('startDate').value;
      const end   = document.getElementById('endDate').value;
      if (!start || !end) { toast('Select both start and end dates', 'error'); return; }

      let data;
      try {
        const res = await fetch(
          `${BASE_URL}/reports/summary?startDate=${encodeURIComponent(start)}&endDate=${encodeURIComponent(end)}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        data = await res.json();
        if (!res.ok) { toast(data.message || 'Could not load report', 'error'); return; }
      } catch {
        toast('Network error — is the server running?', 'error');
        return;
      }

      // ── API response shape (from reportController.js):
      // data.range                     { startDate, endDate }
      // data.patientsByStatus          { "waiting": N, "in-consultation": N, "completed": N }
      // data.transactionsByStatus      { <status>: count }
      // data.transactionAmountByStatus { <status>: totalAmount }

      const pByStatus  = data.patientsByStatus         || {};
      const txByStatus = data.transactionsByStatus      || {};
      const txAmounts  = data.transactionAmountByStatus || {};

      // ── Date range label ──
      const fmt = d => new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
      document.getElementById('dateRangeNote').textContent =
        `Period: ${fmt(data.range?.startDate || start)}  →  ${fmt(data.range?.endDate || end)}`;

      // ── Stat cards ──
      const waiting    = pByStatus['waiting']         || 0;
      const inConsult  = pByStatus['in-consultation'] || 0;
      const completed  = pByStatus['completed']       || 0;
      const totalPts   = waiting + inConsult + completed;
      const totalRev   = Object.values(txAmounts).reduce((a, b) => a + b, 0);

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-num">${totalPts}</div>
          <div class="stat-label">Total Patients</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${waiting}</div>
          <div class="stat-label">Waiting</div>
        </div>
        <div class="stat-card warn">
          <div class="stat-num">${inConsult}</div>
          <div class="stat-label">In Consultation</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-num">${completed}</div>
          <div class="stat-label">Completed</div>
        </div>`;

      // ── Patient status bar chart ──
      const statusOrder  = ['waiting', 'in-consultation', 'completed'];
      const statusLabels = { 'waiting': 'Waiting', 'in-consultation': 'Active', 'completed': 'Done' };
      const patientEntries = [];
      statusOrder.forEach(k => {
        if (pByStatus[k] !== undefined) patientEntries.push([statusLabels[k], pByStatus[k]]);
      });
      Object.entries(pByStatus).forEach(([k, v]) => {
        if (!statusOrder.includes(k)) patientEntries.push([k, v]);
      });
      renderBarChart('patientStatusChart', patientEntries);

      // ── Revenue bar chart ──
      const amountEntries = Object.entries(txAmounts).map(([k, v]) => [
        (k === 'null' || k === 'undefined' || !k) ? 'Untagged' : k,
        Math.round(v)
      ]);
      renderBarChart('txAmountChart', amountEntries, 'warn');

      // ── Transaction breakdown table ──
      const txWrap     = document.getElementById('txTableWrap');
      const allStatuses = [...new Set([...Object.keys(txByStatus), ...Object.keys(txAmounts)])];

      if (!allStatuses.length) {
        txWrap.innerHTML = '<div class="empty-state">No transactions in this period</div>';
      } else {
        const totalTxCount = Object.values(txByStatus).reduce((a, b) => a + b, 0);
        txWrap.innerHTML = `
          <table class="amount-table">
            <thead>
              <tr>
                <th>Status</th>
                <th>Count</th>
                <th>Total Revenue</th>
                <th>Avg per Transaction</th>
              </tr>
            </thead>
            <tbody>
              ${allStatuses.map(s => {
                const count  = txByStatus[s] || 0;
                const amount = txAmounts[s]  || 0;
                const avg    = count > 0 ? (amount / count) : null;
                const label  = (s === 'null' || s === 'undefined' || !s) ? 'Untagged' : s;
                return `<tr>
                  <td style="font-family:'DM Mono',monospace;font-size:11px;
                             text-transform:uppercase;color:var(--muted)">${label}</td>
                  <td style="font-family:'DM Mono',monospace">${count}</td>
                  <td style="font-family:'DM Mono',monospace;color:var(--accent)">
                    ₹${Number(amount).toLocaleString('en-IN')}</td>
                  <td style="font-family:'DM Mono',monospace;color:var(--muted)">
                    ${avg !== null ? '₹' + Number(avg).toLocaleString('en-IN', {maximumFractionDigits:2}) : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
            <tfoot>
              <tr style="border-top:1px solid var(--border)">
                <td style="font-family:'DM Mono',monospace;font-size:10px;
                           text-transform:uppercase;color:var(--muted)">Total</td>
                <td style="font-family:'DM Mono',monospace">${totalTxCount}</td>
                <td style="font-family:'DM Mono',monospace;color:var(--accent);font-weight:600">
                  ₹${Number(totalRev).toLocaleString('en-IN')}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>`;
      }

      document.getElementById('results').style.display = 'block';
      toast('Report loaded', 'success');
    }
  </script>
</body>
</html>
